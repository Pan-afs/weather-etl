services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
      POSTGRES_DB: weather

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  airflow:
    image: apache/airflow:2.9.3

    ports:
      - "8080:8080"

    volumes:
      - ./dags:/opt/airflow/dags

    depends_on:
      - postgres

    command: airflow standalone


volumes:
  postgres_data: